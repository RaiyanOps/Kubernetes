apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-cleanup-sa
  namespace: npss-edge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-cleanup-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-cleanup-cluster-role-binding
subjects:
- kind: ServiceAccount
  name: pod-cleanup-sa
  namespace: npss-edge
roleRef:
  kind: ClusterRole
  name: pod-cleanup-cluster-role
  apiGroup: rbac.authorization.k8s.io
